replicaCount: 1
image:
  repository: ghcr.io/project-zot/zot-linux-amd64
  pullPolicy: IfNotPresent
  # tag: "v2.1.17"
namespace: ""
serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 5000
  nodePort: null
  annotations: {}
  clusterIP: null

env:
  - name: AWS_ACCESS_KEY_ID
    value: "xwQ6RMnu4zpoy8DiwsWm"
  - name: AWS_SECRET_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: zot-creds
        key: secretkey

# If mountConfig is true the configMap named $CHART_RELEASE-config is mounted
# on the pod's '/etc/zot' directory
mountConfig: true
configFiles:
  config.json: |-
    {
      "storage": {
        "rootDirectory": "/var/lib/registry",
        "dedupe": true,
        "storageDriver": {
          "name": "s3",
          "region": "us-east-1",
          "regionendpoint": "http://192.168.0.20:9000",
          "bucket": "zot-registry",
          "secure": false,
          "skipverify": false,
          "forcepathstyle": true
        }
      },
      "http": {
        "address": "0.0.0.0",
        "port": "5000"
      },
      "extensions": {
        "search": { "enable": true },
        "ui": { "enable": true }
      },
      "log": { "level": "info" }
    }


strategy:
  type: RollingUpdate

